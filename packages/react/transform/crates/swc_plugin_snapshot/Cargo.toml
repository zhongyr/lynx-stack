[package]
name = "swc_plugin_snapshot"
version = "0.1.0"
edition = "2021"

[lib]
path = "lib.rs"

[features]
napi = ["dep:napi", "dep:napi-derive", "swc_plugins_shared/napi"]

[dependencies]
convert_case = { workspace = true }
hex = { workspace = true }
napi = { workspace = true, optional = true }
napi-derive = { workspace = true, optional = true }
once_cell = { workspace = true }
regex = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["preserve_order"] }
sha-1 = { workspace = true }
swc_core = { workspace = true, features = ["ecma_parser", "ecma_utils", "ecma_quote", "ecma_visit", "testing_transform", "ecma_transforms_react"] }
swc_plugins_shared = { path = "../swc_plugins_shared" }
