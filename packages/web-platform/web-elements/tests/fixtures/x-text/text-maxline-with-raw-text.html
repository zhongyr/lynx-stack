<html>
  <head>
    <meta charset="utf-8">
    <title>web playground</title>
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="default" name="apple-mobile-web-app-status-bar-style">
    <meta content="telephone=no" name="format-detection">
    <meta content="portrait" name="screen-orientation">
    <meta
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
      name="viewport"
    >
    <meta content="portrait" name="x5-orientation" />
    <link
      href="/main.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <script src="/main.js" defer></script>
    <style>
    .text {
      width: 300px;
      word-break: break-all;
      margin-bottom: 20px;
    }
    inline-truncation {
      color: aqua;
    }
    </style>

    <x-text class="text" text-maxline="4">
      <raw-text
        text="4hello world, this is a long enough text without any limitation."
      ></raw-text>
      <x-text style="color: pink"><raw-text
          text="we could use inline-text to set color of some text"
        ></raw-text></x-text>
      <x-text style="font-weight: 500; font-size: 3em"><raw-text
          text="also, font-size could be different"
        ></raw-text></x-text>
      <x-text style="font-weight: 500; letter-spacing: 7px"><raw-text
          text="additionally, letter-space could be different"
        ></raw-text></x-text>
    </x-text>
  </body>
</html>
